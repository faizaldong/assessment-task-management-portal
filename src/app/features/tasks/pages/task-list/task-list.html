<app-navbar></app-navbar>

<div class="container">
  <h2>Task List</h2>

  <div *ngIf="loading(); else table">
    <mat-spinner></mat-spinner>
  </div>

  <ng-template #table>
    <button mat-raised-button color="primary" routerLink="/tasks/create">
      Create Task
    </button>

    <mat-form-field appearance="outline">
      <mat-label>Filter by Priority</mat-label>
      <mat-select (selectionChange)="filterByPriority($event.value)">
        <mat-option value="">All</mat-option>
        <mat-option value="Low">Low</mat-option>
        <mat-option value="Medium">Medium</mat-option>
        <mat-option value="High">High</mat-option>
      </mat-select>
    </mat-form-field>

    <table
      mat-table
      matSort
      [dataSource]="dataSource"
      class="mat-elevation-z8"
    >

      <!-- Task Name -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Task Name
        </th>
        <td mat-cell *matCellDef="let task">
          {{ task.name }}
        </td>
      </ng-container>

      <!-- Status -->
      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Status
        </th>
        <td mat-cell *matCellDef="let task">
          {{ task.status }}
        </td>
      </ng-container>

      <!-- Assigned -->
      <ng-container matColumnDef="assignedTo">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Assigned To
        </th>
        <td mat-cell *matCellDef="let task">
          {{ task.assignedTo }}
        </td>
      </ng-container>

      <!-- Priority -->
      <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>
          Priority
        </th>
        <td mat-cell *matCellDef="let task">
          <span [ngClass]="task.priority.toLowerCase()">
            {{ task.priority }}
          </span>
        </td>
      </ng-container>

      <!-- Actions -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let task">
          <button mat-button color="primary" (click)="viewTask(task)">
            View
          </button>
          <button mat-button color="accent" (click)="editTask(task)">
            Edit
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

    </table>
  </ng-template>
</div>
